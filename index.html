<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Explore India with Shiv</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f0e6, #efe1c6);
            overflow-x: hidden;
        }

        /* MAIN CONTENT */
        .hero {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-box {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            max-width: 700px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .hero-box h1 {
            font-size: 3rem;
            font-weight: 800;
            color: #7b3f00;
        }

        .hero-box h1 span {
            color: #e67e22;
        }

        .hero-box p {
            font-size: 1.15rem;
            color: #4a4a4a;
            margin-top: 20px;
        }

        .explore-btn {
            margin-top: 30px;
            padding: 14px 40px;
            font-size: 1.1rem;
            border-radius: 40px;
            background: linear-gradient(45deg, #e67e22, #d35400);
            color: white;
            border: none;
            box-shadow: 0 8px 20px rgba(230,126,34,0.4);
        }

        .explore-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(230,126,34,0.6);
        }

        /* TAGLINE STRIP */
        .tagline {
            margin-top: 25px;
            font-weight: 600;
            color: #2c3e50;
        }
    </style>
</head>

<body>

    <!-- MAIN HERO SECTION -->
    <section class="hero">
        <div class="hero-box">
            <h1>Explore <span>India</span> with Shiv </h1>

            <p>
                A land of temples and tribes, forts and faiths,  
                spices and stories — explore every state, culture, food,
                and heritage of India through one interactive journey.
            </p>

            <button class="explore-btn" onclick="window.location.href='login.html'">
                Start Exploring Bharat
            </button>

            <div class="tagline">
                One Nation · Many Cultures · Infinite Stories
            </div>
        </div>
    </section>

</body>
</html>

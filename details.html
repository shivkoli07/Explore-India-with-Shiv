<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Details | Explore India with Shiv</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f0e6;
        }

        .navbar {
            background: linear-gradient(45deg, #e67e22, #d35400);
        }

        .navbar-brand {
            color: #fff !important;
            font-weight: 700;
        }

        .details-header {
            padding: 30px 20px;
            background: linear-gradient(to right, #fff3e0, #ffe0b2);
            text-align: center;
        }

        .details-header h2 {
            color: #7b3f00;
            font-weight: 800;
        }

        .list-section {
            padding: 40px 20px;
        }

        /* 🧱 CARD */
        .item-card {
            background: white;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 22px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .item-card:hover {
            transform: translateY(-3px);
        }

        .item-title {
            color: #d35400;
            font-weight: 700;
            margin-bottom: 15px;
        }

        /* 🔥 CONTENT LAYOUT */
        .item-content {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        /* 🔥 BIGGER IMAGE (UPDATED) */
        .item-img {
            width: 280px;
            height: 200px;
            object-fit: cover;
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .item-text {
            flex: 1;
            font-size: 1rem;
            line-height: 1.6;
        }

        .item-meta {
            font-size: 0.9rem;
            color: #888;
            margin-top: 8px;
        }

        /* 📱 MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .item-content {
                flex-direction: column;
                text-align: center;
            }

            .item-img {
                width: 100%;
                height: auto;
            }
        }

        .footer-note {
            text-align: center;
            padding: 25px;
            font-size: 0.85rem;
            color: #888;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Explore India with Shiv</a>
    </div>
</nav>

<div class="details-header">
    <h2 id="pageTitle"></h2>
    <p id="pageSubtitle"></p>
</div>

<div class="list-section container" id="listContainer">
</div>

<div class="footer-note">
    Discover the soul of India 🇮🇳
</div>

<script src="js/data.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);
    const state = params.get("state");
    const type = params.get("type");

    const typeLabels = {
        places: "Best Places",
        food: "Best Food",
        shopping: "Shopping Places",
        culture: "Culture & History",
        dishes: "Local Dishes"
    };

    document.getElementById("pageTitle").innerText = `${typeLabels[type]} in ${state}`;
    document.getElementById("pageSubtitle").innerText = `Explore ${typeLabels[type].toLowerCase()} of ${state}`;

    const container = document.getElementById("listContainer");

    const items = getStateData(state, type);

    items.forEach((item, index) => {
        container.innerHTML += `
            <div class="item-card">

                <h5 class="item-title">${index + 1}. ${item.title}</h5>

                <div class="item-content">

                    <img src="${item.image}" class="item-img" alt="${item.title}">

                    <div class="item-text">
                        <p>${item.description}</p>
                        <p class="item-meta">📍 ${item.location}</p>
                    </div>

                </div>

            </div>
        `;
    });
</script>

</body>
</html>

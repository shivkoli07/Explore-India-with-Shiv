<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Explore India with Shiv</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f0e6, #efe1c6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            position: relative;
        }

        .login-card h2 {
            font-weight: 700;
            color: #7b3f00;
            text-align: center;
        }

        .login-card p {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            background: linear-gradient(45deg, #e67e22, #d35400);
            border: none;
            color: white;
            font-weight: 600;
        }

        .login-btn:hover {
            box-shadow: 0 10px 25px rgba(230,126,34,0.5);
        }

        .back-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            text-decoration: none;
            background: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            color: #7b3f00;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .google-btn {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid #ccc;
            background: white;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="login-card">

        <!-- BACK BUTTON -->
        <a href="index.html" class="back-btn">⬅ Back</a>

        <h2>Welcome Back 🇮🇳</h2>
        <p>Login to explore India</p>

        <form id="loginForm">
            <div class="mb-3">
                <input type="email" class="form-control" id="email" placeholder="Email address" required>
            </div>

            <div class="mb-3">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>
        </form>

        <button class="google-btn" onclick="fakeGoogleLogin()">
            Continue with Google
        </button>

    </div>

    <!-- IMPORTANT PATH FIX -->
    <script src="js/auth.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>India Maps | Explore India with Shiv</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f0e6;
        }

        .navbar {
            background: linear-gradient(45deg, #e67e22, #d35400);
        }

        .navbar-brand {
            color: #fff !important;
            font-weight: 700;
        }

        .page-container {
            display: flex;
            height: calc(100vh - 56px);
        }

        .sidebar {
            width: 300px;
            background: #fffaf0;
            padding: 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
        }

        .sidebar h4 {
            color: #7b3f00;
            font-weight: 700;
        }

        select {
            margin-top: 15px;
        }

        .map-area {
            flex: 1;
            position: relative;
            background: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .map-area img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.5s ease-in-out;
        }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 12px 16px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
            z-index: 10;
        }

        .prev { left: 20px; }
        .next { right: 20px; }

        .map-label {
            position: absolute;
            bottom: 15px;
            background: rgba(255,255,255,0.9);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            color: #7b3f00;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Explore India with Shiv</a>
    </div>
</nav>

<div class="page-container">

    <div class="sidebar">
        <h4>Select State / UT</h4>
        <p>Choose a state to explore places, food, culture & history.</p>

        <select class="form-select" onchange="goToState(this.value)">
            <option value="">-- Select --</option>

            <!-- STATES -->
            <option>Andhra Pradesh</option>
            <option>Arunachal Pradesh</option>
            <option>Assam</option>
            <option>Bihar</option>
            <option>Chhattisgarh</option>
            <option>Goa</option>
            <option>Gujarat</option>
            <option>Himachal Pradesh</option>
            <option>Jharkhand</option>
            <option>Karnataka</option>
            <option>Kerala</option>
            <option>Madhya Pradesh</option>
            <option>Maharashtra</option>
            <option>Manipur</option>
            <option>Meghalaya</option>
            <option>Mizoram</option>
            <option>Nagaland</option>
            <option>Odisha</option>
            <option>Punjab</option>
            <option>Rajasthan</option>
            <option>Sikkim</option>
            <option>Tamil Nadu</option>
            <option>Telangana</option>
            <option>Tripura</option>
            <option>Uttar Pradesh</option>
            <option>Uttarakhand</option>
            <option>West Bengal</option>

            <!-- UTs -->
            <option>Andaman & Nicobar Islands</option>
            <option>Chandigarh</option>
            <option>Dadra & Nagar Haveli and Daman & Diu</option>
            <option>Delhi</option>
            <option>Jammu & Kashmir</option>
            <option>Ladakh</option>
            <option>Lakshadweep</option>
            <option>Puducherry</option>
        </select>
    </div>

    <div class="map-area">

        <button class="slider-btn prev" onclick="prevMap()">❮</button>
        <button class="slider-btn next" onclick="nextMap()">❯</button>

        <img id="mapImage" src="" alt="India Map">
        <div class="map-label" id="mapLabel"></div>

    </div>
</div>

<script>
    const maps = [
        {
            label: "Political Map of India",
            url: "https://www.indianembassynetherlands.gov.in/content/1664008981_Political%20Map%20of%20India%20(English),%202020.jpg"
        },
        {
            label: "Physical Map of India",
            url: "https://www.indianembassynetherlands.gov.in/content/1664010343_Physical%20Map%20of%20India%20(1).jpg"
        },
        {
            label: "Standard India Map",
            url: "https://www.mapsofindia.com/images2/india-map.jpg"
        },
        {
            label: "Digital India Map",
            url: "https://img.freepik.com/premium-photo/map-india-made-with-connected-lines-glowing-dots_926199-3019806.jpg"
        },
        {
            label: "Cultural Textile Map",
            url: "https://png.pngtree.com/png-clipart/20250807/original/pngtree-indian-map-crafted-from-textile-patterns-of-different-states-on-a-png-image_21641416.png"
        },

        /* ================= NEW ADDED MAPS ================= */

        {
            label: "Old World Map India",
            url: "https://www.shutterstock.com/image-photo/old-world-map-india-sri-600w-2264308139.jpg"
        },
        {
            label: "Highlighted India Map",
            url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQdbHZvAgUGKfsp0MKCFxEVAVa0EOVwfageVg&s"
        },
        {
            label: "Heritage Map of India",
            url: "https://www.tourmyindia.com/images/heritage_1.jpg"
        },
        {
            label: "Jyotirlinga Map of India",
            url: "https://www.mapsofindia.com/maps/india/india-map-jyotirlinga.jpg"
        }
    ];

    let index = 0;
    let autoSlide;

    function loadMap() {
        const img = document.getElementById("mapImage");
        const label = document.getElementById("mapLabel");

        img.style.opacity = 0;

        setTimeout(() => {
            img.src = maps[index].url;
            label.innerText = maps[index].label;
            img.style.opacity = 1;
        }, 200);
    }

    function nextMap() {
        index = (index + 1) % maps.length;
        loadMap();
        resetAutoSlide();
    }

    function prevMap() {
        index = (index - 1 + maps.length) % maps.length;
        loadMap();
        resetAutoSlide();
    }

    function autoChange() {
        autoSlide = setInterval(() => {
            index = (index + 1) % maps.length;
            loadMap();
        }, 5000); // ⏱️ every 5 seconds
    }

    function resetAutoSlide() {
        clearInterval(autoSlide);
        autoChange();
    }

    function goToState(state) {
        if (state) {
            window.location.href = `state.html?state=${encodeURIComponent(state)}`;
        }
    }

    loadMap();
    autoChange();
</script>

</body>
</html>
